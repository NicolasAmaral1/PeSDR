# secrets.example.yaml — TEMPLATE PLAINTEXT (NÃO CIFRADO, NÃO PRODUÇÃO).
#
# ⚠️ ESTE ARQUIVO É APENAS DEMONSTRATIVO. NÃO COLOCAR VALORES REAIS AQUI E NÃO COMMITAR
#    SE HOUVER ALGUMA EDIÇÃO COM SECRET REAL.
#
# Pra criar o arquivo cifrado real:
#   1. Crie tenants/manoela-mentora/secrets.yaml plaintext com os valores reais
#   2. Rode: sops --encrypt --in-place tenants/manoela-mentora/secrets.yaml
#   3. Renomeie: mv tenants/manoela-mentora/secrets.yaml tenants/manoela-mentora/secrets.enc.yaml
#   4. Comite secrets.enc.yaml (cifrado)
#   5. APAGUE qualquer plaintext local
#
# IMPORTANTE: este template lista TODAS as chaves esperadas. Faltar alguma →
# loader falha no startup. Ter chaves extras é tolerado mas faz lixo.

# ─── Já existentes (não alterar nesta spec) ──────────────────────────────

anthropic_key: "sk-ant-XXXXXXXX"
openai_key: "sk-proj-XXXXXXXX"

# WhatsApp Cloud (Meta Business)
wa_phone_id: "<id_do_numero_aqui>"
wa_token: "EAAxxx..."          # System User Token (long-lived)
wa_verify: "<verify_string_que_voce_inventa>"
wa_app_secret: "<app_secret_do_meta_for_developers>"

# ─── NOVOS (esta spec — Form ingestion + CRM) ────────────────────────────

# Form: Respondi
# Gere com: python3 -c "import secrets; print(secrets.token_urlsafe(32))"
# Cole no painel Respondi → webhook URL → ?secret=<value>
respondi_webhook_secret: "<aleatoria_forte_32+_chars>"

# CRM: RD Station OAuth2
# Obter via `scripts/oauth_flow_init.py` (uma vez)
rdstation_refresh_token: "<refresh_token_obtido_via_authorization_code>"

# Painel RD Station → seu App registrado em developers.rdstation.com
rdstation_client_id: "<rdstation_client_id_do_seu_app>"
rdstation_client_secret: "<rdstation_client_secret_do_seu_app>"
