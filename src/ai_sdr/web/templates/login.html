<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PeSDR Console — Login</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #111827;
      --text-muted: #4b5563;
      --text-subtle: #6b7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
      background: #f7f8fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: white;
      padding: 32px 28px;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(17, 24, 39, 0.06), 0 8px 24px rgba(17, 24, 39, 0.08);
      width: 340px;
      border: 1px solid var(--border);
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0 0 4px 0;
      letter-spacing: -0.01em;
    }
    .subtitle {
      color: var(--text-subtle);
      font-size: 13px;
      margin: 0 0 24px 0;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: white;
      margin-bottom: 16px;
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    input[type="text"]:hover,
    input[type="password"]:hover { border-color: #9ca3af; }
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    }
    button {
      width: 100%;
      padding: 10px 12px;
      background: var(--primary);
      color: white;
      border: 1px solid var(--primary);
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }
    button:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.35);
    }
    button:active { background: #1e40af; }
    button:disabled { background: #9ca3af; border-color: #9ca3af; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PeSDR Console</h1>
    <p class="subtitle">Faça login para continuar</p>
    {% if error %}<div class="error" role="alert">{{ error }}</div>{% endif %}
    <form method="POST" action="/console/login">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" autofocus autocomplete="username" required>
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button type="submit">Entrar</button>
    </form>
  </div>
</body>
</html>
