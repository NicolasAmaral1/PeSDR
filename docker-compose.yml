services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai_sdr_postgres
    environment:
      POSTGRES_USER: ai_sdr
      POSTGRES_PASSWORD: ai_sdr_dev
      POSTGRES_DB: ai_sdr
    ports:
      - "15432:5432"          # VPS: 5432 already taken by aios-central-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_sdr -d ai_sdr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ai_sdr_redis
    ports:
      - "16379:6379"          # VPS: 6379 already in use
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: ai_sdr_api
    command: uv run uvicorn ai_sdr.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_sdr_app:ai_sdr_app@postgres:5432/ai_sdr
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TENANTS_DIR: /app/tenants
      SOPS_AGE_KEY_FILE: /app/.sops/age.key
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-pesdr-dev}
    ports:
      - "8200:8000"          # VPS: 8000 already taken by portainer
    volumes:
      - ./tenants:/app/tenants:ro
      - ./.sops:/app/.sops:ro
    restart: unless-stopped

  worker:
    build: .
    container_name: ai_sdr_worker
    command: uv run ai-sdr worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_sdr_app:ai_sdr_app@postgres:5432/ai_sdr
      REDIS_URL: redis://redis:6379/0
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TENANTS_DIR: /app/tenants
      SOPS_AGE_KEY_FILE: /app/.sops/age.key
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-pesdr-dev}
    volumes:
      - ./tenants:/app/tenants:ro
      - ./.sops:/app/.sops:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
