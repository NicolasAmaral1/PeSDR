name: CI

# First CI safety net: runs the suites that need NO external services.
#  - unit (612 backend tests) + frontend (vitest + build) are BLOCKING gates.
#  - ruff lint is ADVISORY for now (the repo has ~180 pre-existing lint errors;
#    making it blocking would red-light every PR until that debt is cleaned).
# Integration tests (tests/integration) need Postgres + Redis + the sops age key
# as a secret — deferred to a follow-up job.

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# CI auto-enables color; rich then interleaves ANSI codes that break a CLI
# --help substring assertion (test_outbound_cli). NO_COLOR forces plain output.
env:
  NO_COLOR: "1"

jobs:
  lint:
    name: Lint (ruff) — advisory
    runs-on: ubuntu-latest
    continue-on-error: true # advisory until the ~180 pre-existing lint errors are cleaned
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check .

  unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - name: Unit tests (no DB/Redis)
        run: uv run pytest tests/unit -q

  frontend:
    name: Frontend (vitest + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: frontend
      - name: Tests
        run: npm run test
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
