schema_version: 1
id: qualificacao_inicial
version: 0.2.0
display_name: "Qualificação Inicial (Manoela — stub de validação E2E, arquitetura v2)"

# STUB DE VALIDAÇÃO v2 — funil mínimo viável pra testar o pipeline FlowEngine:
#   mensagem chega → worker (arch v2) → run_turn (1 LLM call) → humanização → adapter envia
#
# Convertido do stub v1 (0.1.0, `prompt:`) pro schema FlowEngine v2
# (`objetivo:` + `bridge_instruction:`) com showcase das features FE-03:
#   - talk_lifecycle (FE-03b): close por inatividade/duração + completion rule
#   - on_collected (FE-03c): action de teste via adapter `logging` (fake)
#
# Sem KB e sem objections (intencional, pra simplificar o primeiro E2E).
# Quando o funil real da Manoela for autorado, este arquivo vira template.

sdr_persona:
  voice: |
    Tom PT-BR informal e caloroso, frases curtas, jeito brasileiro de conversar
    no WhatsApp. Sem formalismo corporativo, sem emoji excessivo.
  conduct: |
    1. Sempre reconheça o que o lead disse antes de perguntar a próxima coisa.
    2. Nunca invente preços, produtos ou promessas fora do que foi configurado.
    3. Em dúvida factual, diga "vou confirmar com a equipe e te retorno".
    4. UMA pergunta por mensagem — nunca metralhadora de perguntas.
  examples:
    - context: "lead pergunta preço logo na primeira mensagem"
      bad_response: "A Mentoria custa R$ 6.000."
      good_response: "Já te falo de valores! Antes, me conta rapidinho — qual seu momento de negócio hoje?"
      why: "preço sem contexto de valor vira objeção imediata"

entry_node: saudacao

nodes:
  - id: saudacao
    objetivo: "Cumprimentar o lead em PT-BR informal e coletar o primeiro nome."
    bridge_instruction: |
      Primeira mensagem do lead. Cumprimente em UMA frase curta, brasileira,
      sem formalismo, e pergunte o primeiro nome. Tom: amigável, próximo.
    collects:
      - field: nome
        type: text
        extraction_hint: "primeiro nome do lead (extrair só se ele realmente disse)"
        required: true
    exit_condition:
      type: all_fields_filled
    next_nodes:
      - condition: "is_set('nome')"
        target: qualificacao

  - id: qualificacao
    objetivo: "Descobrir o faturamento mensal aproximado do negócio do lead."
    bridge_instruction: |
      O lead já disse o nome. Cumprimente pelo nome em UMA frase e pergunte,
      de forma natural e sem pressão, qual o faturamento mensal aproximado
      da empresa dele, em reais. Tom: amigável, consultivo.
    collects:
      - field: faturamento_mensal
        type: number
        extraction_hint: "valor mensal em R$, em número (sem 'R$' nem 'mil' — ex: 50000)"
        required: true
    exit_condition:
      type: rule_expression
      expression: "faturamento_mensal is not None"
    next_nodes: []
    # FE-03c showcase: quando faturamento é coletado, dispara action de teste.
    # Adapter `logging` é o fake built-in — loga e retorna id determinístico.
    # No funil real, vira create_deal no CRM (Plano 7).
    on_collected:
      - field: faturamento_mensal
        adapter: logging
        handler: register_lead_revenue
        params:
          lead_nome: "{{ collected.nome }}"
          faturamento: "{{ collected.faturamento_mensal }}"
          fonte: "qualificacao_inicial"

# FE-03b showcase: lifecycle automático da Talk.
talk_lifecycle:
  close_after_inactivity: P2D     # 48h sem mensagem → closed_inactivity
  close_after_duration: P14D      # 14 dias de Talk → closed_duration
  close_when_completed:
    - expression: "faturamento_mensal is not None"
      outcome: success            # qualificação completa → closed_completed_success
